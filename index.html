<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dr. Razhan Kamil Clinic | Patient Records</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <header>
            <h1>Dr. Razhan Kamil Clinic</h1>
            <p>Digital Dental Database</p>
        </header>

        <section class="form-container">
            <h2>New Patient Entry</h2>
            <form id="patientForm">
                <div class="input-group">
                    <input type="text" id="name" placeholder="Patient Name (ناو)" required>
                    <input type="tel" id="phone" placeholder="Phone Number" required>
                </div>
                <div class="input-group">
                    <select id="gender" required>
                        <option value="" disabled selected>Gender (رەگەز)</option>
                        <option value="Male">Male</option>
                        <option value="Female">Female</option>
                    </select>
                    <input type="number" id="age" placeholder="Age (تەمەن)" required>
                </div>
                
                <textarea id="medicalHistory" placeholder="Medical History (e.g., Penicillin Allergy, Diabetes)"></textarea>
                
                <textarea id="clinicalNotes" placeholder="Clinical Notes (e.g., Used 2% Lidocaine, patient cooperated well)"></textarea>

                <div class="input-group">
                    <select id="procedure" required>
                        <option value="" disabled selected>Select Procedure</option>
                        <option value="Consultation">Consultation (راوێژکاری)</option>
                        <option value="Scaling & Polishing">Bleaching (سپیکردنەوە)</option>
                        <option value="Scaling & Polishing">Cleaning (پاکردنەوە)</option>
                        <option value="Composite Filling">Composite Filling (فیلینگ)</option>
                        <option value="RCT">Root Canal (عسب برین)</option>
                        <option value="Extraction">Extraction (دەرهێنان)</option>
                        <option value="Crown/Bridge">Crown/Bridge (کراون/جسر)</option>
                        <option value="Denture">Denture (تاقم)</option>
                        <option value="Orthodontic">Orthodontic Visit (سەردان)</option>
                    </select>
                </div>

                <button type="submit">Save Record</button>
            </form>
        </section>

        <section class="list-container">
            <div class="list-header">
                <h2>Recent Patients</h2>
                <input type="text" id="searchInput" placeholder="Search by name...">
            </div>
            <div class="table-responsive">
                <table>
                    <thead>
                        <tr>
                            <th>Date</th>
                            <th>Patient</th>
                            <th>Details</th>
                            <th>History</th>
                            <th>Procedure</th>
                            <th>Notes</th> <th>Action</th>
                        </tr>
                    </thead>
                    <tbody id="patientTableBody"></tbody>
                </table>
            </div>
        </section>
    </div>
    <script src="script.js"></script>
</body>
</html>
